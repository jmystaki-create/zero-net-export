      - type: grid
        cards:
          - type: heading
            heading: Zero Net Export optional debug dashboard
            heading_style: title
            icon: mdi:home-lightning-bolt-outline
          - type: markdown
            content: |
              This dashboard is optional debug visibility inside Home Assistant, not part of the supported operator path.

              Use it for live state, controller intent, guard visibility, and managed-load review.

      - type: grid
        cards:
          - type: heading
            heading: Live power picture
            icon: mdi:flash
          - type: tile
            entity: sensor.zero_net_export_solar_power
            name: Solar
          - type: tile
            entity: sensor.zero_net_export_home_load_power
