          - type: tile
            entity: sensor.zero_net_export_grid_export_power
            name: Grid export
          - type: tile
            entity: sensor.zero_net_export_battery_state_of_charge
            name: Battery SOC
          - type: tile
            entity: sensor.zero_net_export_active_controlled_power
            name: Controlled load
          - type: tile
            entity: sensor.zero_net_export_surplus
            name: Surplus
