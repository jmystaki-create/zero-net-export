      - type: grid
        cards:
          - type: heading
            heading: Managed-load card template
            icon: mdi:lightning-bolt-circle
          - type: markdown
            content: |
              Add one dedicated card per controlled load using the entities the integration already exposes.

              Recommended per-device card contents:
              - `switch.zero_net_export_<device_key>_enabled`
              - `binary_sensor.zero_net_export_<device_key>_usable`
              - `number.zero_net_export_<device_key>_priority`
              - `button.zero_net_export_<device_key>_reset_overrides`
              - `sensor.zero_net_export_<device_key>_status`
              - `sensor.zero_net_export_<device_key>_planned_action`
              - `sensor.zero_net_export_<device_key>_guard_status`
              - `sensor.zero_net_export_<device_key>_current_power_w`
              - `sensor.zero_net_export_<device_key>_planned_power_delta_w`
              - `sensor.zero_net_export_<device_key>_last_requested_power_w`
              - `sensor.zero_net_export_<device_key>_last_applied_power_w`
              - `sensor.zero_net_export_<device_key>_current_active_seconds`
              - `sensor.zero_net_export_<device_key>_active_runtime_today_seconds`
              - `sensor.zero_net_export_<device_key>_last_action_status`
              - `sensor.zero_net_export_<device_key>_last_action_result_message`

      - type: grid
        cards:
          - type: heading
            heading: Operator notes
            icon: mdi:note-text-outline
          - type: markdown
            content: |
              - This stays fully inside Home Assistant, no external panel.
              - Use Configure as the command center for sources, policy, managed devices, and support.
              - Use the integration device page for Repairs plus setup and diagnostics actions.
              - Use this dashboard only for optional debug visibility after the native workflow is in place.
              - If a load is not acting, check fleet summary, control summary, guard summary, per-source staleness, and the recent failure timeline before changing mappings.
