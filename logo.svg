<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#f0f8ff" stroke="#2c5f2d" stroke-width="2"/>
  
  <!-- Sun (Solar) -->
  <circle cx="100" cy="70" r="25" fill="#ffcc00"/>
  <g stroke="#ffcc00" stroke-width="3" stroke-linecap="round">
    <line x1="100" y1="35" x2="100" y2="20"/>
    <line x1="100" y1="105" x2="100" y2="120"/>
    <line x1="65" y1="70" x2="50" y2="70"/>
    <line x1="135" y1="70" x2="150" y2="70"/>
    <line x1="75" y1="45" x2="65" y2="35"/>
    <line x1="125" y1="45" x2="135" y2="35"/>
    <line x1="75" y1="95" x2="65" y2="105"/>
    <line x1="125" y1="95" x2="135" y2="105"/>
  </g>
  
  <!-- Battery (Storage) -->
  <rect x="75" y="110" width="50" height="30" rx="3" fill="#2c5f2d"/>
  <rect x="80" y="115" width="40" height="20" rx="2" fill="#4caf50"/>
  <rect x="125" y="120" width="5" height="10" rx="1" fill="#2c5f2d"/>
  
  <!-- Zero Symbol / Balance Arrows -->
  <path d="M 60 150 Q 60 170 80 170 Q 100 170 100 150 Q 100 130 80 130 Q 60 130 60 150" 
        fill="none" stroke="#1976d2" stroke-width="4" stroke-linecap="round"/>
  <path d="M 140 150 Q 140 170 120 170 Q 100 170 100 150 Q 100 130 120 130 Q 140 130 140 150" 
        fill="none" stroke="#1976d2" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Up/Down Arrows showing balance -->
  <path d="M 90 145 L 90 135 L 85 140" fill="none" stroke="#1976d2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 110 145 L 110 135 L 115 140" fill="none" stroke="#1976d2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Text: Zero Net Export -->
  <text x="100" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c5f2d">
    Zero Net Export
  </text>
</svg>
