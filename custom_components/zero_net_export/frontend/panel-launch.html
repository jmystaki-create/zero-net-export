<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Zero Net Export setup launcher</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f9fafb;
      }
      main {
        width: min(36rem, calc(100vw - 2rem));
        padding: 1.5rem;
        border-radius: 1rem;
        background: #1f2937;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin-top: 0;
        font-size: 1.3rem;
      }
      p {
        line-height: 1.5;
      }
      a {
        display: inline-block;
        margin-top: 0.75rem;
        padding: 0.8rem 1rem;
        border-radius: 0.75rem;
        background: #2563eb;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
      code {
        word-break: break-all;
      }
      .muted {
        color: #cbd5e1;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Opening Zero Net Export setup…</h1>
      <p>This launcher is redirecting Home Assistant to the real Zero Net Export setup and mapping panel.</p>
      <p class="muted">If Home Assistant does not switch automatically, use the button below.</p>
      <a id="open-link" href="/zero-net-export?tab=setup" target="_top" rel="noopener">Open the real Zero Net Export setup panel in Home Assistant</a>
      <p class="muted">Target: <code id="target-text">/zero-net-export?tab=setup</code></p>
    </main>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search || '');
        const rawTarget = params.get('target') || '/zero-net-export?tab=setup';
        const target = rawTarget.startsWith('/') ? rawTarget : '/zero-net-export?tab=setup';
        const link = document.getElementById('open-link');
        const text = document.getElementById('target-text');
        if (link) {
          link.href = target;
        }
        if (text) {
          text.textContent = target;
        }

        const requestHaNavigation = (targetWindow) => {
          if (!targetWindow || !targetWindow.history || !targetWindow.dispatchEvent) {
            return false;
          }
          try {
            targetWindow.history.pushState(null, '', target);
            targetWindow.dispatchEvent(new targetWindow.CustomEvent('location-changed', {
              detail: { replace: false },
            }));
            return true;
          } catch (err) {
            return false;
          }
        };

        const hardNavigate = (targetWindow, { replace = false } = {}) => {
          if (!targetWindow?.location) {
            return false;
          }
          try {
            if (replace) {
              targetWindow.location.replace(target);
            } else {
              targetWindow.location.assign(target);
            }
            return true;
          } catch (err) {
            return false;
          }
        };

        const navigate = (targetWindow, { replace = false } = {}) => (
          requestHaNavigation(targetWindow) || hardNavigate(targetWindow, { replace })
        );

        const candidates = [];
        for (const candidate of [window.top, window.opener, window.parent, window]) {
          if (candidate && !candidates.includes(candidate)) {
            candidates.push(candidate);
          }
        }

        for (const candidate of candidates) {
          if (candidate === window && navigate(candidate, { replace: true })) {
            return;
          }
          if (candidate !== window && navigate(candidate)) {
            try {
              window.close();
            } catch (err) {}
            return;
          }
        }

        window.location.replace(target);
      })();
    </script>
  </body>
</html>
