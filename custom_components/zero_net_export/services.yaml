update_managed_device:
  name: Update managed device
  description: Update Zero Net Export settings for a managed device. This changes only the ZNE managed-load record; it does not edit the original Home Assistant device.
  fields:
    entry_id:
      name: Config entry ID
      description: Optional Zero Net Export config entry id used when more than one entry is installed.
      selector:
        text:
    device_key:
      name: Device key
      description: Zero Net Export managed-device key.
      required: true
      selector:
        text:
    name:
      name: Name
      selector:
        text:
    entity_id:
      name: Entity
      selector:
        entity:
    enabled:
      name: Enabled
      selector:
        boolean:
    priority:
      name: Priority
      selector:
        number:
          min: 0
          max: 1000
          mode: box
    nominal_power_w:
      name: Nominal power W
      selector:
        number:
          min: 1
          max: 100000
          mode: box
    min_power_w:
      name: Minimum power W
      selector:
        number:
          min: 1
          max: 100000
          mode: box
    max_power_w:
      name: Maximum power W
      selector:
        number:
          min: 1
          max: 100000
          mode: box
    step_w:
      name: Step W
      selector:
        number:
          min: 1
          max: 100000
          mode: box
    min_on_seconds:
      name: Minimum on seconds
      selector:
        number:
          min: 0
          max: 86400
          mode: box
    min_off_seconds:
      name: Minimum off seconds
      selector:
        number:
          min: 0
          max: 86400
          mode: box
    cooldown_seconds:
      name: Cooldown seconds
      selector:
        number:
          min: 0
          max: 86400
          mode: box
    max_active_seconds:
      name: Maximum active seconds
      selector:
        number:
          min: 0
          max: 86400
          mode: box

remove_managed_device:
  name: Remove managed device
  description: Remove one load from Zero Net Export management only. The original Home Assistant device and entity are left untouched.
  fields:
    entry_id:
      name: Config entry ID
      description: Optional Zero Net Export config entry id used when more than one entry is installed.
      selector:
        text:
    device_key:
      name: Device key
      description: Zero Net Export managed-device key to remove.
      required: true
      selector:
        text:
    confirm:
      name: Confirm removal
      description: Must be true. This is a safety guard for scripts and manual service calls.
      required: true
      selector:
        boolean:
